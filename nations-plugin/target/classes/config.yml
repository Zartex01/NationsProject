plugin:
  debug: false
  language: fr

database:
  url: "data.db"

nations:
  max-name-length: 20
  min-name-length: 3
  max-description-length: 100
  creation-cost: 500
  upkeep-per-day: 0
  max-members: 100

claims:
  max-per-player-base: 10
  price-per-chunk: 100
  allow-diagonal-claims: false

grades:
  joueur:
    max-claims: 10
    display: "Joueur"
    color: "GRAY"
    permission: ""
  soutien:
    max-claims: 20
    display: "Soutien"
    color: "GREEN"
    permission: "nations.grade.soutien"
  premium:
    max-claims: 35
    display: "Premium"
    color: "GOLD"
    permission: "nations.grade.premium"
  chevalier:
    max-claims: 55
    display: "Chevalier"
    color: "AQUA"
    permission: "nations.grade.chevalier"
  roi:
    max-claims: 80
    display: "Roi"
    color: "LIGHT_PURPLE"
    permission: "nations.grade.roi"

economy:
  starting-balance: 250
  nation-tax-rate: 0.0
  max-personal-balance: -1
  max-nation-balance: -1

wars:
  declaration-cost: 1000
  declaration-cooldown-hours: 24
  max-active-wars: 3
  min-online-to-declare: 2
  types:
    PILLAGE:
      duration-hours: 24
      enabled: true
    CONQUEST:
      duration-hours: 48
      enabled: true
    EXTERMINATION:
      duration-hours: 72
      enabled: true
    SIEGE:
      duration-hours: 48
      enabled: true
    RAID:
      duration-hours: 12
      enabled: true
    ANNIHILATION:
      duration-hours: 96
      enabled: true

seasons:
  duration-days: 30
  rewards:
    first-place: 10000
    first-place-xp: 5000
    second-place: 5000
    second-place-xp: 2500
    third-place: 2500
    third-place-xp: 1000
  level:
    xp-per-block-placed: 1
    xp-per-kill: 50
    xp-per-war-won: 500
    xp-per-claim: 10
    max-level: 100
    xp-formula-multiplier: 100
  nation-level:
    max-level: 50
    xp-formula-multiplier: 1000

messages:
  prefix: "&8[&6Nations&8] "
  no-permission: "&cVous n'avez pas la permission d'effectuer cette action."
  player-only: "&cCette commande est réservée aux joueurs."
  invalid-usage: "&cUsage: "
  unknown-player: "&cJoueur introuvable."
