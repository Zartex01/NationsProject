plugin:
  debug: false
  language: fr

database:
  url: "data.db"

nations:
  max-name-length: 20
  min-name-length: 3
  max-description-length: 100
  creation-cost: 500
  upkeep-per-day: 0
  max-members: 100

claims:
  max-per-player-base: 10
  price-per-chunk: 100
  allow-diagonal-claims: false

grades:
  joueur:
    display: "Joueur"
    color: "&7"
    max-claims: 10
  heros:
    display: "Héros"
    color: "&e"
    max-claims: 30
  chevalier:
    display: "Chevalier"
    color: "&b"
    max-claims: 55
  premium:
    display: "Héros"
    color: "&6"
    max-claims: 80
  roi:
    display: "Roi"
    color: "&d"
    max-claims: 120

# ============================================================
#  Permissions des rôles — tout est configurable ici
#  Tu peux ajouter autant de permissions que tu veux dans
#  "nation-role-permissions" et elles apparaîtront dans le GUI
#  automatiquement. Utilise member.hasPerm("ta-permission")
#  dans le code pour vérifier une permission custom.
# ============================================================

# Métadonnées de chaque permission (affichage dans le GUI)
nation-role-permissions:
  can-build:
    display: "Construire"
    description: "Placer et casser des blocs dans les claims"
    material: GRASS_BLOCK
  can-invite:
    display: "Inviter"
    description: "Inviter des joueurs dans la nation"
    material: PAPER
  can-kick:
    display: "Expulser"
    description: "Expulser des membres de la nation"
    material: LEATHER_BOOTS
  can-promote:
    display: "Promouvoir"
    description: "Promouvoir des membres à un rang superieur"
    material: DIAMOND
  can-demote:
    display: "Retrograder"
    description: "Retrograder des membres a un rang inferieur"
    material: COAL
  can-claim:
    display: "Revendiquer"
    description: "Claim des chunks de territoire"
    material: MAP
  can-unclaim:
    display: "Liberer"
    description: "Liberer des chunks de territoire"
    material: BARRIER
  can-manage-war:
    display: "Guerres"
    description: "Declarer et gerer des guerres"
    material: IRON_SWORD
  can-manage-bank:
    display: "Retrait banque"
    description: "Retirer de l'argent de la banque"
    material: GOLD_BLOCK
  can-deposit-bank:
    display: "Depot banque"
    description: "Deposer de l'argent dans la banque"
    material: GOLD_INGOT
  can-manage-allies:
    display: "Alliances"
    description: "Gerer les alliances avec d'autres nations"
    material: WHITE_BANNER
  can-rename:
    display: "Renommer"
    description: "Renommer la nation"
    material: NAME_TAG
  can-set-description:
    display: "Description"
    description: "Modifier la description de la nation"
    material: BOOK
  can-dissolve:
    display: "Dissoudre"
    description: "Dissoudre la nation definitivement"
    material: TNT
  can-set-home:
    display: "Def. Home"
    description: "Definir le point de ralliement de la nation"
    material: RESPAWN_ANCHOR
  can-teleport-home:
    display: "Teleportation"
    description: "Se teleporter au home de la nation"
    material: ENDER_PEARL
  can-open-nation:
    display: "Ouvrir/Fermer"
    description: "Ouvrir ou fermer la nation aux nouvelles recrues"
    material: IRON_DOOR
  can-access-storage:
    display: "Coffre partage"
    description: "Acceder au coffre partage de la nation"
    material: CHEST
  can-manage-flags:
    display: "Parametres"
    description: "Modifier les parametres et drapeaux de la nation"
    material: LEVER
  can-use-atm:
    display: "ATM Nation"
    description: "Utiliser la trésorerie de la nation via ATM"
    material: EMERALD

