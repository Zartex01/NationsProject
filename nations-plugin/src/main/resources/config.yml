economy:
  starting-balance: 250
  nation-tax-rate: 0.0
  max-personal-balance: -1
  max-nation-balance: -1

wars:
  declaration-cost: 1000
  declaration-cooldown-hours: 24
  max-active-wars: 3
  min-online-to-declare: 2
  types:
    PILLAGE:
      duration-hours: 24
      enabled: true
    CONQUEST:
      duration-hours: 48
      enabled: true
    EXTERMINATION:
      duration-hours: 72
      enabled: true
    SIEGE:
      duration-hours: 48
      enabled: true
    RAID:
      duration-hours: 12
      enabled: true
    ANNIHILATION:
      duration-hours: 96
      enabled: true

seasons:
  duration-days: 30
  rewards:
    first-place: 10000
    first-place-xp: 5000
    second-place: 5000
    second-place-xp: 2500
    third-place: 2500
    third-place-xp: 1000
  level:
    xp-per-block-placed: 1
    xp-per-kill: 50
    xp-per-war-won: 500
    xp-per-claim: 10
    max-level: 100
    xp-formula-multiplier: 100
  nation-level:
    max-level: 50
    xp-formula-multiplier: 1000

# Commandes réservées à certains grades (et aux grades supérieurs)
# Les admins (nations.admin) ont toujours accès à tout
# La hiérarchie : joueur < heros < chevalier < premium < roi
grade-commands:
  joueur: []
  heros:
    - craft
    - workbench
    - wb
    - pweather
    - weather
    - ptime
    - time
    - kit
  chevalier:
    - furnace
    - four
    - stonecutter
    - tailleur
    - anvil
    - enclume
    - back
    - ec
    - enderchest
    - echest
    - xpb
    - xpbottle
    - xpbouteille
  premium:
    - repair
    - reparer
    - nick
    - pseudo
    - surnom
  roi:
    - hat

messages:
  prefix: "&8[&6Nations&8] "
  no-permission: "&cVous n'avez pas la permission d'effectuer cette action."
  player-only: "&cCette commande est réservée aux joueurs."
  invalid-usage: "&cUsage: "
  unknown-player: "&cJoueur introuvable."
