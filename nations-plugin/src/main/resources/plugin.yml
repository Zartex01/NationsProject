name: NationsEpoque
version: '${project.version}'
main: fr.nations.NationsPlugin
api-version: '1.20'
description: Plugin de nations avec 6 époques historiques et guerres d'assaut
authors: [Zartex01]

commands:
  nation:
    description: Commande principale des nations
    usage: /nation <sous-commande>
    aliases: [n]
    permission: nations.use
  war:
    description: Commande de gestion des guerres
    usage: /war <sous-commande>
    aliases: [guerre]
    permission: nations.war
  coalition:
    description: Commande de gestion des coalitions
    usage: /coalition <sous-commande>
    aliases: [co]
    permission: nations.use
  claim:
    description: Commande de claim de territoire
    usage: /claim [sous-commande]
    aliases: [territoire]
    permission: nations.claim
  money:
    description: Commande d'économie personnelle
    usage: /money <sous-commande>
    aliases: [eco, argent]
    permission: nations.use
  season:
    description: Commande de gestion des saisons
    usage: /season <sous-commande>
    aliases: [saison]
    permission: nations.use
  nationsadmin:
    description: Commande d'administration des nations
    usage: /nationsadmin <sous-commande>
    aliases: [nadmin]
    permission: nations.admin
  nationrole:
    description: Gestion des rôles personnalisés de nation
    usage: /nationrole <sous-commande>
    aliases: [nrole, role]
    permission: nations.use
  atm:
    description: Convertit ton temps de jeu en argent (x2 par minute)
    usage: /atm
    aliases: [distributeur]
    permission: nations.use
  pay:
    description: Envoyer des coins à un joueur
    usage: /pay <joueur> <montant>
    aliases: [payer, virement]
    permission: nations.use
  bal:
    description: Voir sa balance ou celle d'un joueur
    usage: /bal [joueur]
    aliases: [balance, solde]
    permission: nations.use
  givemoney:
    description: Donner des coins à un joueur (admin)
    usage: /givemoney <joueur> <montant>
    aliases: [addmoney, givecoins]
    permission: nations.admin
  setgrade:
    description: Définir le grade d'un joueur (admin)
    usage: /setgrade <joueur> <grade>
    aliases: [grade, donnergrade]
    permission: nations.admin
  # ──── Kits ────
  kit:
    description: Récupérer votre kit de grade
    usage: /kit [heros|chevalier|premium]
    aliases: [kits]
    permission: nations.use
  # ──── Grade Héros ────
  craft:
    description: Ouvrir une table de craft virtuelle
    usage: /craft
    aliases: [workbench, wb]
  pweather:
    description: Changer sa météo personnelle
    usage: /pweather <clear|rain|reset>
    aliases: [weather]
  ptime:
    description: Changer son heure personnelle
    usage: /ptime <day|night|noon|midnight|reset>
    aliases: [time]
  # ──── Grade Chevalier ────
  furnace:
    description: Ouvrir un four virtuel (+ /furnace all pour fusionner)
    usage: /furnace [all]
    aliases: [four]
  stonecutter:
    description: Ouvrir une taillerie de pierres virtuelle
    usage: /stonecutter
    aliases: [tailleur]
  anvil:
    description: Ouvrir une enclume virtuelle
    usage: /anvil
    aliases: [enclume]
  back:
    description: Retourner à votre dernière position (mort ou téléportation)
    usage: /back
  ec:
    description: Ouvrir votre coffre de l'Ender
    usage: /ec
    aliases: [enderchest, echest]
  xpb:
    description: Convertir vos niveaux d'XP en bouteilles d'expérience
    usage: /xpb <nombre-de-bouteilles>
    aliases: [xpbottle, xpbouteille]
  # ──── Grade Héros (ancien Premium) ────
  repair:
    description: Réparer l'objet en main (1h) ou tous les objets (24h)
    usage: /repair [all]
    aliases: [reparer]
  nick:
    description: Changer votre pseudo affiché en jeu
    usage: /nick <pseudo|reset>
    aliases: [pseudo, surnom]
  # ──── HDV ────
  hdv:
    description: Hôtel des Ventes — marché entre joueurs
    usage: /hdv [sell]
    aliases: [hotel, marche, marketplace]
    permission: nations.use
  # ──── Shop ────
  shop:
    description: Ouvrir la boutique du serveur
    usage: /shop
    aliases: [boutique, magasin]
    permission: nations.use
  sell:
    description: Vendre des objets (hand = en main, all = tout l'inventaire)
    usage: /sell [hand|all]
    aliases: [vendre]
    permission: nations.use

permissions:
  nations.use:
    description: Permission d'utiliser les nations
    default: true
  nations.war:
    description: Permission de déclarer des guerres
    default: true
  nations.claim:
    description: Permission de claim des territoires
    default: true
  nations.admin:
    description: Permission d'administration
    default: op
  nations.staff:
    description: Permission du staff (validation guerres, etc.)
    default: op
  nations.bypass:
    description: Bypass la protection des claims
    default: op
  nations.grade.joueur:
    description: Grade Joueur (10 claims max)
    default: true
  nations.grade.heros:
    description: "Grade Héros — Kit Héros, /craft, /pweather, /ptime, 10 homes, AFK 25min"
    default: false
  nations.grade.chevalier:
    description: "Grade Chevalier — Kit Chevalier, /furnace, /stonecutter, /anvil, /back, /ec, /xpb, 20 homes, AFK 35min"
    default: false
    children:
      nations.grade.heros: true
  nations.grade.premium:
    description: "Grade Premium — Kit Premium, /repair, /repair all, /nick, /furnace all, /sell all, 30 homes, AFK 1h"
    default: false
    children:
      nations.grade.chevalier: true
      nations.sell.all: true
  nations.grade.roi:
    description: Grade Roi (120 claims max)
    default: false
    children:
      nations.grade.premium: true
  # Permissions pour les systèmes futurs (Hôtel des ventes, Mine)
  nations.hotel.slots.heros:
    description: "10 emplacements dans l'Hôtel des Ventes (Héros)"
    default: false
  nations.hotel.slots.chevalier:
    description: "20 emplacements dans l'Hôtel des Ventes (Chevalier)"
    default: false
  nations.hotel.slots.premium:
    description: "30 emplacements dans l'Hôtel des Ventes (Premium)"
    default: false
  nations.mine.heros:
    description: "Accès à la seconde mine du spawn (Héros)"
    default: false
  nations.sell.all:
    description: "Vendre tous les objets avec /sell all (Premium)"
    default: false
